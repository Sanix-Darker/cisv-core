name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build core
        run: make -C core all
      - name: Archive core
        run: |
          tar -czf cisv-core-${GITHUB_REF_NAME}.tar.gz core
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cisv-core-${{ github.ref_name }}.tar.gz
