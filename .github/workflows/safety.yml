name: Safety

on:
  push:
  pull_request:

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang
      - name: Cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --std=c11 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=memleak:core/src/parser.c \
            --inline-suppr \
            core/src core/include core/tests

  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Build sanitizer test binary
        run: |
          make -C core clean
          make -C core test-debug
      - name: Run sanitizer tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_init_order=1:check_initialization_order=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          ./core/build/test_core_debug

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install valgrind and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential valgrind
      - name: Run valgrind safety check
        run: |
          make -C core clean
          make -C core all
          make -C core valgrind
