name: Benchmark Core

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 bc time
      - name: Build
        run: make -C core all
      - name: Smoke benchmark
        run: |
          python3 - <<'PY'
import csv
with open('bench.csv','w',newline='') as f:
    w=csv.writer(f)
    w.writerow(['id','name'])
    for i in range(200000):
        w.writerow([i,f'name_{i}'])
PY
          # core repo intentionally benchmarks via downstream repos/CLI.
          ls -lh bench.csv
